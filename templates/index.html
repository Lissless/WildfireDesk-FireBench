<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WildfireDesk</title>

  <!-- connect external css file -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- import inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>WildfireDesk</h1>
      <p>Ask Sage about wildfire recovery, next steps, or community action.</p>
    </div>

    <div id="chat" class="chat-container">
      <div class="message sage loading" id="intro-message">Loading Sage...</div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="Type your question here..." />
      <button id="send-button">Send</button>
    </div>
  </div>

  <!-- markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // grab the main page elements
    const chat = document.getElementById("chat");
    const userInput = document.getElementById("user-input");
    const sendButton = document.getElementById("send-button");
    const introMessage = document.getElementById("intro-message");

    // create and download a word document from html content
    function downloadWordDoc(filename, htmlContent) {
      const fullHtml = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:w="urn:schemas-microsoft-com:office:word"
              xmlns="http://www.w3.org/TR/REC-html40">
          <head>
            <meta charset="utf-8">
            <title>${filename}</title>
          </head>
          <body>
            ${htmlContent}
          </body>
        </html>
      `;

      const blob = new Blob(['\ufeff', fullHtml], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    // size the textarea to match the content, but cap it at 70% of screen height
    function autoResizeTextarea(textarea) {
      textarea.style.height = "auto";
      const maxHeight = window.innerHeight * 0.7;
      textarea.style.height = Math.min(textarea.scrollHeight, maxHeight) + "px";
    }

    // add a message bubble to the chat
    function addMessage(text, sender, sources = null, showActions = true) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${sender}`;

      // create the rendered markdown content
      const contentDiv = document.createElement("div");
      contentDiv.className = "message-content";
      contentDiv.innerHTML = marked.parse(text);
      wrapper.appendChild(contentDiv);

      let sourcesDiv = null;

      // add sources block if sources exist
      if (sources) {
        sourcesDiv = document.createElement("div");
        sourcesDiv.className = "sources";

        if (typeof sources === "string") {
          sourcesDiv.innerHTML = marked.parse(sources);
        } else {
          sourcesDiv.textContent = JSON.stringify(sources, null, 2);
        }

        wrapper.appendChild(sourcesDiv);
      }

      // only sage responses get action buttons
      if (sender === "sage" && showActions) {
        const actions = document.createElement("div");
        actions.className = "message-actions";

        const copyBtn = document.createElement("button");
        copyBtn.className = "action-button";
        copyBtn.textContent = "Copy";

        const editBtn = document.createElement("button");
        editBtn.className = "action-button";
        editBtn.textContent = "Edit";

        const downloadBtn = document.createElement("button");
        downloadBtn.className = "action-button";
        downloadBtn.textContent = "Download";

        let isEditing = false;
        let textarea = null;
        let originalText = text;

        // copy the visible text of the message
        copyBtn.onclick = async () => {
          await navigator.clipboard.writeText(contentDiv.innerText);
          copyBtn.textContent = "Copied";
          setTimeout(() => {
            copyBtn.textContent = "Copy";
          }, 1500);
        };

        // switch into edit mode or save edited content
        editBtn.onclick = () => {
          if (!isEditing) {
            isEditing = true;

            // create the textarea with the original markdown text
            textarea = document.createElement("textarea");
            textarea.className = "message-editor";
            textarea.value = originalText;

            // replace rendered content with the textarea
            wrapper.replaceChild(textarea, contentDiv);
            wrapper.classList.add("editing");

            editBtn.textContent = "Save";

            // wait until textarea is in the dom, then size it to match message height
            requestAnimationFrame(() => {
              autoResizeTextarea(textarea);
              textarea.focus();
              textarea.setSelectionRange(textarea.value.length, textarea.value.length);
            });

            // resize while user types
            textarea.addEventListener("input", () => autoResizeTextarea(textarea));

            // add cancel button if it does not already exist
            let cancelBtn = actions.querySelector('[data-role="cancel"]');

            if (!cancelBtn) {
              cancelBtn = document.createElement("button");
              cancelBtn.className = "action-button cancel-button";
              cancelBtn.textContent = "Cancel";
              cancelBtn.dataset.role = "cancel";

              // put original rendered message back if user cancels
              cancelBtn.onclick = () => {
                isEditing = false;
                contentDiv.innerHTML = marked.parse(originalText);
                wrapper.replaceChild(contentDiv, textarea);
                wrapper.classList.remove("editing");
                editBtn.textContent = "Edit";
                cancelBtn.remove();
              };

              actions.appendChild(cancelBtn);
            }

          } else {
            isEditing = false;

            // save updated text and render it as markdown again
            originalText = textarea.value;
            contentDiv.innerHTML = marked.parse(originalText);

            wrapper.replaceChild(contentDiv, textarea);
            wrapper.classList.remove("editing");
            editBtn.textContent = "Edit";

            // remove cancel button after saving
            const cancelBtn = actions.querySelector('[data-role="cancel"]');
            if (cancelBtn) cancelBtn.remove();
          }
        };

        // download the message content, and sources if they exist
        downloadBtn.onclick = () => {
          const temp = document.createElement("div");
          temp.innerHTML = contentDiv.innerHTML;

          if (sourcesDiv) {
            temp.appendChild(document.createElement("hr"));
            temp.appendChild(sourcesDiv.cloneNode(true));
          }

          downloadWordDoc("sage-response.doc", temp.innerHTML);
        };

        actions.appendChild(copyBtn);
        actions.appendChild(editBtn);
        actions.appendChild(downloadBtn);
        wrapper.appendChild(actions);
      }

      // add message to chat and scroll to bottom
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
    }

    // load the intro message from the backend
    async function loadIntro() {
      try {
        const response = await fetch("/intro");
        const data = await response.json();
        introMessage.remove();
        addMessage(data.intro, "sage", null, false);
      } catch {
        introMessage.textContent = "Could not load Sage.";
      }
    }

    // send the user's message to the backend and show sage's response
    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage(message, "user");
      userInput.value = "";

      // show temporary loading state
      const loading = document.createElement("div");
      loading.className = "message sage loading";
      loading.textContent = "Sage is thinking...";
      chat.appendChild(loading);
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        loading.remove();

        if (data.error) {
          addMessage(data.error, "sage");
          return;
        }

        addMessage(data.answer, "sage", data.sources, true);

      } catch {
        loading.remove();
        addMessage("Something went wrong while contacting Sage.", "sage");
      }
    }

    // click send button to submit message
    sendButton.addEventListener("click", sendMessage);

    // press enter to submit message
    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // load intro message when page opens
    loadIntro();
  </script>
</body>
</html>
